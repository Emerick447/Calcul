<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calculatrice</title>
    
</head>
<body>

    <h2>Calculatrice</h2>

    <input type="number" id="nb1" placeholder="Premier nombre">

    <select id="operation">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">×</option>
        <option value="/">÷</option>
    </select>

    <input type="number" id="nb2" placeholder="Deuxième nombre">

    <!-- From Uiverse.io by Itskrish01 --> 
<div class="relative group">
  <div
    class="relative w-64 h-14 opacity-90 overflow-hidden rounded-xl bg-black z-10"
  >
    <div
      class="absolute z-10 -translate-x-44 group-hover:translate-x-[30rem] ease-in transistion-all duration-700 h-full w-44 bg-gradient-to-r from-gray-500 to-white/10 opacity-30 -skew-x-12"
    ></div>

    <div
      class="absolute flex items-center justify-center text-white z-[1] opacity-90 rounded-2xl inset-0.5 bg-black"
    >
      <button
        name="text"
        class="input font-semibold text-lg h-full opacity-90 w-full px-16 py-3 rounded-xl bg-black"
        onclick="calculer()"
      >Calculer</button>
    </div>
    <div
      class="absolute duration-1000 group-hover:animate-spin w-full h-[100px] bg-gradient-to-r from-green-500 to-yellow-500 blur-[30px]"
    ></div>
  </div>
</div>


    <p>Résultat : <span id="resultat">?</span></p>

    <script>
        function calculer() {
            let a = parseFloat(document.getElementById("nb1").value);
            let b = parseFloat(document.getElementById("nb2").value);
            let op = document.getElementById("operation").value;
            let resultat;

            switch(op) {
                case "+":
                    resultat = a + b;
                    break;
                case "-":
                    resultat = a - b;
                    break;
                case "*":
                    resultat = a * b;
                    break;
                case "/":
                    resultat = b !== 0 ? a / b : "Erreur : division par 0";
                    break;
            }

            document.getElementById("resultat").textContent = resultat;
        }
    </script>

</body>
</html>
